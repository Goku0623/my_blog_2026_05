services:
  postgres:
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

  redis:
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    restart: always
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/uploads:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --lifespan on

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    restart: always
    command: ["nginx", "-g", "daemon off;"]

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    restart: always
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/uploads:/app/uploads
    command: celery -A app.tasks.celery_app worker --loglevel=warning -c 4

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    restart: always
    volumes:
      - ./backend/logs:/app/logs
    command: celery -A app.tasks.celery_app beat --loglevel=warning

  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    restart: always
    command: celery -A app.tasks.celery_app flower --port=5555 --basic_auth=${FLOWER_USER}:${FLOWER_PASSWORD}

  nginx:
    restart: always
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
